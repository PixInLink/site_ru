name: Deploy CMS to pixinlink.ru

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Create flat .html files for nginx $uri.html fallback
        run: |
          for d in dist/*/; do
            name=$(basename "$d")
            [ "$name" = "assets" ] || [ "$name" = "themes" ] || [ "$name" = ".vite" ] || [ "$name" = "images" ] || [ "$name" = "content" ] && continue
            [ -f "dist/${name}/index.html" ] && cp "dist/${name}/index.html" "dist/${name}.html" && echo "Created: dist/${name}.html"
          done

      - name: Debug secrets
        run: |
          echo "VPS_HOST len=$(echo -n '${{ secrets.VPS_HOST }}' | wc -c)"
          echo "VPS_USER len=$(echo -n '${{ secrets.VPS_USER }}' | wc -c)"
          echo "VPS_PASSWORD len=$(echo -n '${{ secrets.VPS_PASSWORD }}' | wc -c)"

      - name: Fix permissions on server before rsync
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          WEBROOT=/var/www/pixinlink-info
          DEPLOY_USER=${{ secrets.VPS_USER }}
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password \
            -p ${{ secrets.VPS_PORT || '22' }} ${DEPLOY_USER}@${{ secrets.VPS_HOST }} \
            "sudo rm -rf ${WEBROOT}/use-cases/ && sudo mkdir -p ${WEBROOT}/use-cases/ && sudo chown -R ${DEPLOY_USER}:${DEPLOY_USER} ${WEBROOT}/use-cases/ && echo 'use-cases permissions fixed'"

      - name: Deploy to server (tar + ssh, bypass rsync)
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "Password length: $(echo -n "$SSHPASS" | wc -c) chars"
          if [ -z "$SSHPASS" ]; then echo "ERROR: VPS_PASSWORD is empty!"; exit 1; fi

          WEBROOT=/var/www/pixinlink-info
          DEPLOY_USER=${{ secrets.VPS_USER }}
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password -p ${{ secrets.VPS_PORT || '22' }}"

          echo "Uploading dist/ via tar stream..."
          tar czf - -C dist . | sshpass -e ssh $SSH_OPTS ${DEPLOY_USER}@${{ secrets.VPS_HOST }} \
            "sudo rm -rf ${WEBROOT}/use-cases/ && tar xzf - -C ${WEBROOT}/ && sudo kill -HUP \$(pgrep -f 'nginx' | head -1) 2>/dev/null && echo 'deploy + nginx reload OK' || echo 'deploy OK, nginx reload skipped'"

          echo "Deploy finished"

      - name: Health check
        run: |
          for i in $(seq 1 5); do
            if curl -f -s -o /dev/null https://pixinlink.ru; then
              echo "Site OK"
              exit 0
            fi
            echo "Attempt $i/5..."
            sleep 5
          done
          echo "WARNING: Health check failed"
