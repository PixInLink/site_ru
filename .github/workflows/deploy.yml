name: Deploy CMS to pixinlink.ru

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Create flat .html files for nginx $uri.html fallback
        run: |
          for d in dist/*/; do
            name=$(basename "$d")
            [ "$name" = "assets" ] || [ "$name" = "themes" ] || [ "$name" = ".vite" ] || [ "$name" = "images" ] || [ "$name" = "content" ] && continue
            [ -f "dist/${name}/index.html" ] && cp "dist/${name}/index.html" "dist/${name}.html" && echo "Created: dist/${name}.html"
          done

      - name: Debug secrets
        run: |
          echo "VPS_HOST len=$(echo -n '${{ secrets.VPS_HOST }}' | wc -c)"
          echo "VPS_USER len=$(echo -n '${{ secrets.VPS_USER }}' | wc -c)"
          echo "VPS_PASSWORD len=$(echo -n '${{ secrets.VPS_PASSWORD }}' | wc -c)"

      - name: Fix permissions on server before rsync
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          WEBROOT=/var/www/pixinlink-info
          DEPLOY_USER=${{ secrets.VPS_USER }}
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password \
            -p ${{ secrets.VPS_PORT || '22' }} ${DEPLOY_USER}@${{ secrets.VPS_HOST }} \
            "sudo chown -R ${DEPLOY_USER}:${DEPLOY_USER} ${WEBROOT}/ && sudo rm -rf ${WEBROOT}/use-cases/ && echo 'permissions fixed + use-cases cleaned'"

      - name: Deploy to server (scp tar.gz + ssh extract)
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "Password length: $(echo -n "$SSHPASS" | wc -c) chars"
          if [ -z "$SSHPASS" ]; then echo "ERROR: VPS_PASSWORD is empty!"; exit 1; fi

          WEBROOT=/var/www/pixinlink-info
          DEPLOY_USER=${{ secrets.VPS_USER }}
          VPS_HOST=${{ secrets.VPS_HOST }}
          VPS_PORT=${{ secrets.VPS_PORT || '22' }}
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password -p ${VPS_PORT}"
          TARBALL="deploy-$(date +%s).tar.gz"

          echo "Step 1: Create tarball"
          tar czf "${TARBALL}" -C dist .
          echo "Tarball size: $(stat -c%s "${TARBALL}") bytes"

          echo "Step 2: Upload tarball"
          sshpass -e scp -P ${VPS_PORT} -o StrictHostKeyChecking=accept-new "${TARBALL}" "${DEPLOY_USER}@${VPS_HOST}:/tmp/${TARBALL}" || { echo "SCTP FAILED"; exit 1; }

          echo "Step 3: Extract on server"
          sshpass -e ssh ${SSH_OPTS} "${DEPLOY_USER}@${VPS_HOST}" "
            sudo tar xzf /tmp/${TARBALL} -C ${WEBROOT}/
            sudo rm /tmp/${TARBALL}
            echo 'extract OK'
          " || { echo "EXTRACT FAILED"; exit 1; }

          echo "Step 4: Reload nginx"
          sshpass -e ssh ${SSH_OPTS} "${DEPLOY_USER}@${VPS_HOST}" \
            "sudo kill -HUP \$(pgrep -f 'nginx' | head -1) 2>/dev/null && echo 'nginx reloaded' || echo 'nginx reload skipped'"

          rm "${TARBALL}"
          echo "Deploy finished OK"

      - name: Health check
        run: |
          for i in $(seq 1 5); do
            if curl -f -s -o /dev/null https://pixinlink.ru; then
              echo "Site OK"
              exit 0
            fi
            echo "Attempt $i/5..."
            sleep 5
          done
          echo "WARNING: Health check failed"
