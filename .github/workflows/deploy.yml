name: Deploy CMS to pixinlink.ru

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Create flat .html files for nginx $uri.html fallback
        run: |
          for d in dist/*/; do
            name=$(basename "$d")
            [ "$name" = "assets" ] || [ "$name" = "themes" ] || [ "$name" = ".vite" ] || [ "$name" = "images" ] || [ "$name" = "content" ] && continue
            [ -f "dist/${name}/index.html" ] && cp "dist/${name}/index.html" "dist/${name}.html" && echo "Created: dist/${name}.html"
          done

      - name: Debug secrets
        run: |
          echo "VPS_HOST len=$(echo -n '${{ secrets.VPS_HOST }}' | wc -c)"
          echo "VPS_USER len=$(echo -n '${{ secrets.VPS_USER }}' | wc -c)"
          echo "VPS_PASSWORD len=$(echo -n '${{ secrets.VPS_PASSWORD }}' | wc -c)"

      - name: Deploy to server (atomic via symlink)
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "Password length: $(echo -n "$SSHPASS" | wc -c) chars"
          if [ -z "$SSHPASS" ]; then echo "ERROR: VPS_PASSWORD is empty!"; exit 1; fi

          WEBROOT=/var/www/pixinlink-info
          DEPLOY_ID=$(date +%Y%m%d-%H%M%S)
          NEW_DIR="${WEBROOT}-${DEPLOY_ID}"

          echo "Uploading to: ${NEW_DIR}"

          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password \
            -p ${{ secrets.VPS_PORT || '22' }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
                        "sudo mkdir -p ${NEW_DIR} && sudo chown \$(whoami) ${NEW_DIR}"

          sshpass -e rsync -avzrc \
            -e "ssh -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password -p ${{ secrets.VPS_PORT || '22' }}" \
            dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${NEW_DIR}/

          echo "Switching symlink..."

          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password \
            -p ${{ secrets.VPS_PORT || '22' }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sudo ln -sfn ${NEW_DIR} ${WEBROOT} && sudo nginx -t && sudo systemctl reload nginx && echo 'Deployed: ${NEW_DIR} -> ${WEBROOT}'"

          echo "Cleaning up old releases (keep last 3)..."
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password \
            -p ${{ secrets.VPS_PORT || '22' }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'ls -d /var/www/pixinlink-info-* 2>/dev/null | sort | head -n -3 | xargs -r sudo rm -rf && echo "Cleanup done"'

      - name: Health check
        run: |
          for i in $(seq 1 5); do
            if curl -f -s -o /dev/null https://pixinlink.ru; then
              echo "Site OK"
              exit 0
            fi
            echo "Attempt $i/5..."
            sleep 5
          done
          echo "WARNING: Health check failed"
