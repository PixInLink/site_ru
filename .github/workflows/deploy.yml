name: Deploy CMS to pixinlink.ru

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Deploy via rsync
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "Password length: $(echo -n "$SSHPASS" | wc -c) chars"
          if [ -z "$SSHPASS" ]; then echo "ERROR: VPS_PASSWORD is empty!"; exit 1; fi
          sshpass -e rsync -avzr --delete \
            -e "ssh -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password -p ${{ secrets.VPS_PORT || '22' }}" \
            dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/pixinlink-info/

      - name: Health check
        run: |
          for i in $(seq 1 5); do
            if curl -f -s -o /dev/null https://pixinlink.ru; then
              echo "Site OK"
              exit 0
            fi
            echo "Attempt $i/5..."
            sleep 5
          done
          echo "WARNING: Health check failed"
