name: Deploy CMS to pixinlink.ru

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Debug secrets
        run: |
          echo "VPS_HOST len=$(echo -n '${{ secrets.VPS_HOST }}' | wc -c)"
          echo "VPS_USER len=$(echo -n '${{ secrets.VPS_USER }}' | wc -c)"
          echo "VPS_PASSWORD len=$(echo -n '${{ secrets.VPS_PASSWORD }}' | wc -c)"

      - name: Fix nginx config (ensure index.html served for directories)
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password \
            -p ${{ secrets.VPS_PORT || '22' }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'sudo sed -i "s|try_files .*|try_files \$uri \$uri/ /index.html;|" /etc/nginx/sites-available/pixinlink.info && sudo nginx -t && sudo systemctl reload nginx && echo "nginx updated"'

      - name: Deploy via rsync
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "Password length: $(echo -n "$SSHPASS" | wc -c) chars"
          if [ -z "$SSHPASS" ]; then echo "ERROR: VPS_PASSWORD is empty!"; exit 1; fi
          sshpass -e rsync -avzrc --delete \
            -e "ssh -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password -p ${{ secrets.VPS_PORT || '22' }}" \
            dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/pixinlink-info/

      - name: Health check
        run: |
          for i in $(seq 1 5); do
            if curl -f -s -o /dev/null https://pixinlink.ru; then
              echo "Site OK"
              exit 0
            fi
            echo "Attempt $i/5..."
            sleep 5
          done
          echo "WARNING: Health check failed"
